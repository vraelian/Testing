        body {
            background-color: #0f172a;
            color: #f8fafc;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            padding: 2rem;
            margin: 0;
        }
        h1 {
            font-size: 1.5rem;
            margin-top: 0;
            color: #38bdf8;
            border-bottom: 1px solid #334155;
            padding-bottom: 1rem;
        }
        .controls {
            margin-bottom: 2rem;
        }
        select {
            background-color: #1e293b;
            color: white;
            border: 1px solid #475569;
            padding: 0.5rem 1rem;
            font-size: 1rem;
            border-radius: 4px;
            cursor: pointer;
            outline: none;
        }
        select:hover {
            border-color: #64748b;
        }
        #portrait-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 1.5rem;
        }
        .portrait-card {
            background-color: #1e293b;
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            transition: transform 0.1s, border-color 0.1s;
        }
        .portrait-card:hover {
            transform: translateY(-2px);
            border-color: #38bdf8;
        }
        .sprite-window {
            width: 128px;
            height: 128px;
            border-radius: 4px;
            background-image: url('assets/images/characters/characters_sprite.webp');
            background-repeat: no-repeat;
            margin-bottom: 1rem;
            border: 1px solid #0f172a;
        }
        .id-label {
            font-family: monospace;
            font-size: 0.9rem;
            color: #94a3b8;
            background: #0f172a;
            padding: 0.25rem 0.5rem;
            border-radius: 4px;
            cursor: pointer;
            user-select: all;
        }
        .id-label:hover {
            color: #fff;
            background: #38bdf8;
        }
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #22c55e;
            color: #000;
            padding: 10px 20px;
            border-radius: 4px;
            font-weight: bold;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }
    </style>
</head>

        const categories = new Set();
        Object.keys(PortraitRegistry).forEach(key => {
            const match = key.match(/^(.*)_\d+$/);
            if (match) categories.add(match[1]);
        });

        // Populate Dropdown
        Array.from(categories).sort().forEach(cat => {
            const option = document.createElement('option');
            option.value = cat;
            option.textContent = cat.replace(/_/g, ' ');
            select.appendChild(option);
        });

        // Render the Grid
        function renderGrid(category) {
            grid.innerHTML = '';
            
            // Filter registry for items matching the selected category
            const items = Object.entries(PortraitRegistry).filter(([key]) => key.startsWith(category + '_'));
            
            // Sort them numerically so _2 comes before _10
            items.sort((a, b) => {
                const numA = parseInt(a[0].match(/_(\d+)$/)[1]);
                const numB = parseInt(b[0].match(/_(\d+)$/)[1]);
                return numA - numB;
            });

            items.forEach(([id, coords]) => {
                const card = document.createElement('div');
                card.className = 'portrait-card';

                const sprite = document.createElement('div');
                sprite.className = 'sprite-window';
                sprite.style.backgroundPosition = `-${coords.x}px -${coords.y}px`;

                const label = document.createElement('div');
                label.className = 'id-label';
                label.textContent = id;
                label.title = "Click to copy ID";
                
                label.onclick = () => {
                    navigator.clipboard.writeText(id);
                    toast.style.opacity = '1';
                    setTimeout(() => toast.style.opacity = '0', 2000);
                };

                card.appendChild(sprite);
                card.appendChild(label);
                grid.appendChild(card);
            });
        }

        // Initialize
        select.addEventListener('change', (e) => renderGrid(e.target.value));
        renderGrid(select.value); // Render the first category on load
