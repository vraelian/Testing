<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orbital Trading - Encrypted Mission Logs</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Oxanium:wght@300;400;600;800&family=Share+Tech+Mono&display=swap');

        :root {
            --bg-dark: #070709;
            --bg-panel: #111114;
            --bg-card: #18181d;
            --bg-highlight: #22222a;
            --border-color: #2a2a35;
            --border-glow: #424254;
            --text-main: #d1d1d6;
            --text-muted: #7b7b8a;
            --text-bright: #ffffff;
            --accent-color: #f39c12;
            --accent-glow: rgba(243, 156, 18, 0.3);
            --faction-guild: #3498db;
            --faction-syndicate: #9b59b6;
            --faction-station: #2ecc71;
            
            --font-main: 'Oxanium', sans-serif;
            --font-mono: 'Share Tech Mono', monospace;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: var(--font-main);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            background-image: 
                radial-gradient(circle at 50% 0%, rgba(20,20,30,1) 0%, rgba(7,7,9,1) 100%),
                repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.1) 2px, rgba(0,0,0,0.1) 4px);
        }

        /* Top Navigation */
        #top-nav {
            display: flex;
            background-color: #0b0b0e;
            border-bottom: 2px solid var(--border-color);
            padding: 0 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.8);
            z-index: 100;
        }

        .nav-brand {
            display: flex;
            align-items: center;
            font-size: 1.2rem;
            font-weight: 800;
            color: var(--accent-color);
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-right: 40px;
            text-shadow: 0 0 10px var(--accent-glow);
        }

        .nav-tab {
            padding: 20px 30px;
            cursor: pointer;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            border-bottom: 3px solid transparent;
            transition: all 0.3s ease;
        }

        .nav-tab:hover {
            color: var(--text-bright);
            background-color: rgba(255,255,255,0.02);
        }

        .nav-tab.active {
            color: var(--accent-color);
            border-bottom: 3px solid var(--accent-color);
            background: linear-gradient(0deg, rgba(243, 156, 18, 0.1) 0%, transparent 100%);
        }

        /* Main Layout */
        #app-container {
            display: flex;
            flex-grow: 1;
            overflow: hidden;
            position: relative;
        }

        .view-container {
            display: none;
            width: 100%;
            height: 100%;
        }

        .view-container.active {
            display: flex;
        }

        /* --- MISSIONS VIEW --- */
        #sidebar {
            width: 400px;
            background-color: var(--bg-panel);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            box-shadow: 10px 0 30px rgba(0,0,0,0.6);
            z-index: 10;
        }

        .phase-header {
            padding: 15px 20px;
            background: linear-gradient(90deg, #1a1a24 0%, var(--bg-panel) 100%);
            color: var(--text-bright);
            font-size: 0.85rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-bottom: 1px solid var(--border-color);
            border-top: 1px solid var(--border-color);
            position: sticky;
            top: 0;
            z-index: 5;
            box-shadow: 0 5px 10px rgba(0,0,0,0.3);
        }

        .timeline-item {
            padding: 15px 20px;
            border-bottom: 1px solid var(--border-color);
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
        }

        .timeline-item::before {
            content: '';
            position: absolute;
            left: 0; top: 0; bottom: 0; width: 0;
            background-color: var(--accent-color);
            transition: width 0.2s ease;
        }

        .timeline-item:hover { background-color: var(--bg-highlight); }
        .timeline-item.active { background-color: var(--bg-card); }
        .timeline-item.active::before { width: 4px; box-shadow: 0 0 15px var(--accent-color); }

        .item-main { flex-grow: 1; }
        
        .mission-id {
            font-family: var(--font-mono);
            font-size: 1.1rem;
            color: var(--accent-color);
            font-weight: bold;
            margin-bottom: 4px;
        }

        .mission-name {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-bright);
        }

        .item-reward {
            font-family: var(--font-mono);
            font-size: 0.75rem;
            color: #2ecc71;
            text-align: right;
            background: rgba(46, 204, 113, 0.1);
            padding: 4px 8px;
            border-radius: 3px;
            border: 1px solid rgba(46, 204, 113, 0.2);
            white-space: pre-line;
        }

        #content-area {
            flex-grow: 1;
            padding: 40px;
            overflow-y: auto;
            display: flex;
            justify-content: center;
            background: radial-gradient(circle at 50% 50%, #0d0d12 0%, var(--bg-dark) 100%);
        }

        #mission-detail {
            max-width: 900px;
            width: 100%;
            display: none;
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Dual Portraits Header */
        .portraits-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 30px;
        }

        .portrait-block {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 160px;
        }

        .portrait-role {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        .portrait-container {
            width: 128px;
            height: 128px;
            border: 2px solid var(--border-color);
            background-color: #000;
            box-shadow: 0 0 20px rgba(0,0,0,0.8), inset 0 0 20px rgba(0,0,0,0.5);
            position: relative;
            overflow: hidden;
            border-radius: 4px;
        }

        .portrait { width: 100%; height: 100%; }

        .mission-title-area {
            flex-grow: 1;
            text-align: center;
            padding: 0 20px;
        }

        .mission-title-area h2 {
            margin: 0 0 15px 0;
            font-size: 2.2rem;
            color: var(--text-bright);
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }

        .badges { display: flex; gap: 10px; justify-content: center; }
        .badge {
            padding: 6px 12px;
            border-radius: 3px;
            font-size: 0.75rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            background-color: var(--bg-card);
        }

        .badge.guild { color: var(--faction-guild); border: 1px solid var(--faction-guild); box-shadow: 0 0 10px rgba(52, 152, 219, 0.2); }
        .badge.syndicate { color: var(--faction-syndicate); border: 1px solid var(--faction-syndicate); box-shadow: 0 0 10px rgba(155, 89, 182, 0.2); }
        .badge.station { color: var(--faction-station); border: 1px solid var(--faction-station); box-shadow: 0 0 10px rgba(46, 204, 113, 0.2); }

        .section-title {
            color: var(--accent-color);
            font-size: 1rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 40px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
        }
        .section-title::after {
            content: '';
            flex-grow: 1;
            height: 1px;
            background: linear-gradient(90deg, var(--border-color) 0%, transparent 100%);
            margin-left: 15px;
        }

        .dialog-box {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-left: 3px solid var(--accent-color);
            padding: 25px;
            font-size: 1.05rem;
            line-height: 1.7;
            position: relative;
            box-shadow: inset 0 0 30px rgba(0,0,0,0.3);
        }

        .objectives-list { list-style: none; padding: 0; margin: 0; }
        .objectives-list li {
            background-color: rgba(255, 255, 255, 0.03);
            margin-bottom: 10px;
            padding: 15px 20px;
            border-radius: 4px;
            border: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            font-family: var(--font-mono);
            font-size: 0.95rem;
        }
        .objectives-list li b { color: var(--text-bright); font-family: var(--font-main); }
        .objectives-list li::before {
            content: '>';
            color: var(--accent-color);
            margin-right: 15px;
            font-weight: bold;
        }

        .completion-box {
            background: linear-gradient(135deg, rgba(46, 204, 113, 0.05) 0%, transparent 100%);
            border: 1px solid rgba(46, 204, 113, 0.2);
            border-left: 3px solid #2ecc71;
            padding: 25px;
            position: relative;
        }
        .completion-title {
            color: #2ecc71;
            font-weight: 800;
            font-size: 1.2rem;
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        b { color: var(--text-bright); font-weight: 600; }
        i { color: var(--text-muted); font-style: italic; }

        /* --- TIMELINE & REWARDS VIEWS --- */
        .scrolling-timeline-wrapper {
            width: 100%;
            height: 100%;
            overflow-y: auto;
            padding: 40px 0 100px 0;
            position: relative;
        }

        .vertical-line {
            position: absolute;
            top: 0; bottom: 0; left: 50%;
            width: 2px;
            background: var(--border-color);
            transform: translateX(-50%);
        }

        .timeline-grid {
            position: relative;
            max-width: 1000px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 40px;
        }

        .t-node {
            position: relative;
            width: 50%;
            padding: 0 40px;
            display: flex;
            flex-direction: column;
        }

        .t-node.left { align-self: flex-start; text-align: right; align-items: flex-end; }
        .t-node.right { align-self: flex-end; text-align: left; align-items: flex-start; }

        .t-dot {
            position: absolute;
            top: 50%;
            width: 16px;
            height: 16px;
            background: var(--bg-dark);
            border: 3px solid var(--accent-color);
            border-radius: 50%;
            transform: translateY(-50%);
            z-index: 2;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .t-node.left .t-dot { right: -8px; }
        .t-node.right .t-dot { left: -8px; }

        .t-node:hover .t-dot {
            background: var(--accent-color);
            box-shadow: 0 0 15px var(--accent-color);
        }

        .t-content {
            background: var(--bg-panel);
            border: 1px solid var(--border-color);
            padding: 20px;
            border-radius: 4px;
            width: 100%;
            max-width: 400px;
            transition: all 0.3s ease;
            cursor: help;
        }

        .t-node:hover .t-content {
            border-color: var(--accent-color);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transform: translateY(-2px);
        }

        .t-phase {
            font-family: var(--font-mono);
            color: var(--text-muted);
            font-size: 0.75rem;
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        .t-title {
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--text-bright);
        }

        .t-synopsis, .t-reward-desc {
            margin-top: 10px;
            font-size: 0.95rem;
            color: #aaa;
            line-height: 1.5;
        }

        .t-reward-desc {
            font-family: var(--font-mono);
            color: #2ecc71;
            background: rgba(46,204,113,0.05);
            padding: 10px;
            border: 1px solid rgba(46,204,113,0.2);
            border-radius: 3px;
        }

        /* Tooltip logic */
        .tooltip {
            position: fixed;
            background: var(--bg-highlight);
            border: 1px solid var(--accent-color);
            color: var(--text-bright);
            padding: 15px 20px;
            font-size: 0.9rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            border-radius: 4px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s;
            z-index: 1000;
            max-width: 300px;
            line-height: 1.5;
        }

        /* Rewards Summary Footer */
        .rewards-summary {
            margin-top: 60px;
            background: var(--bg-panel);
            border-top: 2px solid var(--accent-color);
            padding: 40px;
            display: flex;
            justify-content: space-around;
            position: relative;
            z-index: 5;
        }

        .stat-box { text-align: center; }
        .stat-title {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-muted);
            margin-bottom: 10px;
        }
        .stat-value {
            font-family: var(--font-mono);
            font-size: 2rem;
            color: #2ecc71;
            font-weight: bold;
            text-shadow: 0 0 15px rgba(46,204,113,0.3);
        }

        /* Scrollbars */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-dark); }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--accent-color); }
    </style>
</head>

    <div id="top-nav">
        <div class="nav-brand">Orbital Trading // Logs</div>
        <div class="nav-tab active" data-target="view-missions">Missions</div>
        <div class="nav-tab" data-target="view-timeline">Timeline</div>
        <div class="nav-tab" data-target="view-rewards">Rewards</div>
    </div>

    <div id="app-container">
        
        <div id="view-missions" class="view-container active">
            <div id="sidebar">
                </div>
            
            <div id="content-area">
                <div id="mission-detail">
                    <div class="portraits-header">
                        <div class="portrait-block">

                        <div class="mission-title-area">

                    <div class="section-title">Context & Directive</div>

                    <div class="section-title">Mission Resolution</div>
                    <div class="completion-box">
                        <div class="completion-title" id="detail-comp-title">Completion</div>
                        <div id="detail-comp-text"></div>
                    </div>
                </div>
                
                <div id="empty-state" style="margin-top: 200px; color: var(--border-glow); font-size: 1.5rem; text-transform: uppercase; letter-spacing: 4px; font-weight: 800;">
                    // Awaiting Decryption
                </div>
            </div>
        </div>

        <div id="view-timeline" class="view-container">
            <div class="scrolling-timeline-wrapper">
                <div class="vertical-line"></div>
                <div class="timeline-grid" id="timeline-grid">
                    </div>
            </div>
        </div>

        <div id="view-rewards" class="view-container" style="flex-direction: column;">
            <div class="scrolling-timeline-wrapper" style="flex-grow: 1;">
                <div class="vertical-line"></div>
                <div class="timeline-grid" id="rewards-grid">
                    </div>
            </div>
            <div class="rewards-summary" id="rewards-summary">
                </div>
        </div>

    </div>

    <div id="tooltip" class="tooltip"></div>

// --- UTILITIES ---

function getPortraitStyle(portraitId) {
    const coords = PortraitRegistry[portraitId];
    if (!coords) return '';
    return `background-image: url('assets/images/characters/characters_sprite.webp'); background-position: -${coords.x + 4}px -${coords.y}px;`;
}

function formatName(str) {
    if (!str) return '';
    return str.replace('loc_', '').replace('_', ' ').replace(/\b\w/g, l => l.toUpperCase());
}

function parseObjective(obj) {
    switch(obj.type) {
        case 'VISIT_SCREEN': return `Visit the <b>${formatName(obj.screenId)}</b> screen under the <b>${formatName(obj.navId)}</b> tab.`;
        case 'TRAVEL_TO': return `Maps to <b>${formatName(obj.target)}</b>.`;
        case 'TRADE_ITEM': return `Trade (<b>${obj.tradeType.toUpperCase()}</b>) <b>${obj.quantity}x ${formatName(obj.goodId)}</b> at ${obj.target ? formatName(obj.target) : 'the local market'}.`;
        case 'DELIVER_ITEM': return `Deliver <b>${obj.quantity}x ${formatName(obj.goodId)}</b> to <b>${formatName(obj.target)}</b>.`;
        case 'HAVE_CREDITS': return `Amass a total net worth of <b>⌬ ${obj.value.toLocaleString()}</b> Credits.`;
        case 'HAVE_DEBT': return `Reduce your Guild debt to <b>⌬ ${obj.value}</b>.`;
        case 'HAVE_HULL_PCT': return `Repair your ship hull to at least <b>${obj.value}%</b>.`;
        case 'HAVE_FUEL_TANK': return `Upgrade your vessel to hold <b>${obj.value}</b> fuel units.`;
        case 'HAVE_ITEM': return `Procure and hold <b>${obj.quantity}x ${formatName(obj.goodId)}</b> in your cargo.`;
        default: return `Complete Task: ${obj.type}`;
    }
}

function formatRewardsStr(rewardsArr) {
    if (!rewardsArr || rewardsArr.length === 0) return 'NO REWARD';
    return rewardsArr.map(r => {
        if (r.type === 'credits') return `⌬ ${r.amount.toLocaleString()}`;
        if (r.type === 'UPGRADE') return `UPGRADE`;
        if (r.type === 'license') return `LICENSE`;
        if (r.type === 'fill_fleet_fuel') return `FUEL VOUCHER`;
        return r.type.toUpperCase();
    }).join('\n');
}

// --- TAB LOGIC ---
document.querySelectorAll('.nav-tab').forEach(tab => {
    tab.addEventListener('click', (e) => {
        document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.view-container').forEach(v => v.classList.remove('active'));
        
        e.target.classList.add('active');
        document.getElementById(e.target.dataset.target).classList.add('active');
    });
});

// --- TOOLTIP LOGIC ---
const tooltip = document.getElementById('tooltip');
document.addEventListener('mousemove', (e) => {
    if (tooltip.style.opacity === '1') {
        tooltip.style.left = (e.clientX + 15) + 'px';
        tooltip.style.top = (e.clientY + 15) + 'px';
    }
});

// --- RENDERERS ---

function initApp() {
    const sidebar = document.getElementById('sidebar');
    const tGrid = document.getElementById('timeline-grid');
    const rGrid = document.getElementById('rewards-grid');
    const rSummary = document.getElementById('rewards-summary');

    let isLeftNode = true;
    let stats = { credits: 0, upgrades: 0, licenses: 0, phases: [] };

    storyData.forEach(phaseData => {
        // Stats tracker
        let phaseStats = { name: phaseData.phase, credits: 0, rewards: 0 };
        
        // Sidebar Phase Header
        const header = document.createElement('div');
        header.className = 'phase-header';
        header.textContent = phaseData.phase;
        sidebar.appendChild(header);

        phaseData.missions.forEach(mission => {
            // --- 1. MISSIONS TAB ---
            const item = document.createElement('div');
            item.className = 'timeline-item';
            
            const rwds = formatRewardsStr(mission.rewards);
            item.innerHTML = `
                <div class="item-main">
                    <div class="mission-id">ID_${mission.id.padStart(3, '0')}</div>
                    <div class="mission-name">${mission.name}</div>
                </div>
                <div class="item-reward">${rwds}</div>
            `;
            item.addEventListener('click', () => loadMission(mission, item));
            sidebar.appendChild(item);

            // --- 2. TIMELINE TAB ---
            const node = document.createElement('div');
            node.className = `t-node ${isLeftNode ? 'left' : 'right'}`;
            node.innerHTML = `
                <div class="t-dot"></div>
                <div class="t-content">
                    <div class="t-phase">M_${mission.id.padStart(2,'0')} // ${mission.host}</div>
                    <div class="t-title">${mission.name}</div>
                </div>
            `;
            
            // Tooltip events
            node.querySelector('.t-content').addEventListener('mouseenter', () => {
                tooltip.innerHTML = `<b>${mission.name}</b><br><br>${mission.synopsis}`;
                tooltip.style.opacity = '1';
            });
            node.querySelector('.t-content').addEventListener('mouseleave', () => {
                tooltip.style.opacity = '0';
            });

            tGrid.appendChild(node);

            // --- 3. REWARDS TAB ---
            if (mission.rewards && mission.rewards.length > 0) {
                const rNode = document.createElement('div');
                rNode.className = `t-node ${isLeftNode ? 'left' : 'right'}`;
                
                const rewardDetails = mission.rewards.map(r => {
                    if (r.type === 'credits') { phaseStats.credits += r.amount; stats.credits += r.amount; return `Credited ⌬ ${r.amount.toLocaleString()} to ledger.`; }
                    if (r.type === 'UPGRADE') { phaseStats.rewards++; stats.upgrades++; return `Permanent Ship Upgrade Authorized.`; }
                    if (r.type === 'license') { phaseStats.rewards++; stats.licenses++; return `Granted Commercial License.`; }
                    if (r.type === 'fill_fleet_fuel') { phaseStats.rewards++; return `Complete Fleet Refuel Voucher.`; }
                }).join('<br>');

                rNode.innerHTML = `
                    <div class="t-dot" style="border-color: #2ecc71;"></div>
                    <div class="t-content" style="border-color: rgba(46,204,113,0.3);">
                        <div class="t-phase" style="color: #2ecc71;">M_${mission.id.padStart(2,'0')} Reward Dispensed</div>
                        <div class="t-title">${mission.name}</div>
                        <div class="t-reward-desc">${rewardDetails}</div>
                    </div>
                `;
                rGrid.appendChild(rNode);
            }

            isLeftNode = !isLeftNode; // Alternate sides
        });

        stats.phases.push(phaseStats);
    });

    // --- REWARDS SUMMARY ---
    rSummary.innerHTML = `
        <div class="stat-box">
            <div class="stat-title">Total Credits Earned</div>
            <div class="stat-value">⌬ ${stats.credits.toLocaleString()}</div>
        </div>
        <div class="stat-box">
            <div class="stat-title">Licenses Acquired</div>
            <div class="stat-value" style="color: var(--accent-color);">${stats.licenses}</div>
        </div>
        <div class="stat-box">
            <div class="stat-title">Upgrades Installed</div>
            <div class="stat-value" style="color: var(--faction-guild);">${stats.upgrades}</div>
        </div>
    `;
}

function loadMission(mission, element) {
    document.querySelectorAll('.timeline-item').forEach(el => el.classList.remove('active'));
    element.classList.add('active');
    
    document.getElementById('empty-state').style.display = 'none';
    const detailView = document.getElementById('mission-detail');
    detailView.style.display = 'block';
    
    // Reset animation
    detailView.style.animation = 'none';
    detailView.offsetHeight; /* trigger reflow */
    detailView.style.animation = null;

    // Header Data
    document.getElementById('detail-name').textContent = mission.name;
    document.getElementById('detail-desc').innerHTML = mission.description;
    
    const isTwist = mission.completion && mission.completion.portraitId && (mission.completion.portraitId !== mission.portraitId);
    
    document.getElementById('init-portrait').style.cssText = getPortraitStyle(mission.portraitId);
    
    const compBlock = document.getElementById('completion-portrait-block');
    if (isTwist) {
        compBlock.style.display = 'flex';
        document.getElementById('comp-portrait').style.cssText = getPortraitStyle(mission.completion.portraitId);
    } else {
        compBlock.style.display = 'none';
    }
    
    // Badges
    const badgesEl = document.getElementById('detail-badges');
    const hostClass = mission.host === 'GUILD' ? 'guild' : (mission.host === 'SYNDICATE' ? 'syndicate' : 'station');
    
    let completionBadge = '';
    if (isTwist) {
        const compClass = mission.completion.host === 'GUILD' ? 'guild' : (mission.completion.host === 'SYNDICATE' ? 'syndicate' : 'station');
        completionBadge = `<span class="badge ${compClass}">Resolved By: ${mission.completion.host}</span>`;
    }

    badgesEl.innerHTML = `
        <span class="badge">Type: Story</span>
        <span class="badge ${hostClass}">Host: ${mission.host}</span>
        ${completionBadge}
    `;

    // Objectives
    const objEl = document.getElementById('detail-objectives');
    objEl.innerHTML = '';
    if (mission.objectives.length === 0) {
        objEl.innerHTML = `<li><i>No specific operational tasks required. Acknowledge transmission.</i></li>`;
    } else {
        mission.objectives.forEach(obj => {
            const li = document.createElement('li');
            li.innerHTML = parseObjective(obj);
            objEl.appendChild(li);
        });
    }

    // Completion
    document.getElementById('detail-comp-title').textContent = mission.completion.title || 'Mission Complete';
    document.getElementById('detail-comp-text').innerHTML = mission.completion.text || '';
}

// Boot
initApp();
</script>
</body>
</html>
